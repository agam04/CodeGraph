# codegraph agent eval set — 50 questions
#
# Each entry:
#   id:                    unique identifier
#   question:              the natural language query
#   category:              expected router classification (structural | lookup | semantic)
#   expected_tools:        list of tool names the agent should call (at least one must match)
#   expected_answer_contains: list of strings that should appear in the final answer (case-insensitive)
#   notes:                 optional — explains why this case is interesting or tricky

# ── STRUCTURAL (15 questions) ─────────────────────────────────────────────────

- id: s01
  question: "What functions call authenticate()?"
  category: structural
  expected_tools: [find_callers]
  expected_answer_contains: [authenticate, caller]

- id: s02
  question: "Who calls the login function?"
  category: structural
  expected_tools: [find_callers]
  expected_answer_contains: [login]

- id: s03
  question: "What does authenticate() call internally?"
  category: structural
  expected_tools: [find_callees]
  expected_answer_contains: [authenticate]

- id: s04
  question: "What are the dependencies of the auth module?"
  category: structural
  expected_tools: [file_dependencies]
  expected_answer_contains: [auth]

- id: s05
  question: "Is it safe to change the authenticate function?"
  category: structural
  expected_tools: [impact_analysis]
  expected_answer_contains: [risk, caller]

- id: s06
  question: "What is the impact of modifying the User model?"
  category: structural
  expected_tools: [impact_analysis]
  expected_answer_contains: [impact, risk]

- id: s07
  question: "Which functions have no callers?"
  category: structural
  expected_tools: [find_dead_code]
  expected_answer_contains: [dead, caller]

- id: s08
  question: "Are there any unused functions I can safely delete?"
  category: structural
  expected_tools: [find_dead_code]
  expected_answer_contains: []

- id: s09
  question: "What files import auth.py?"
  category: structural
  expected_tools: [file_dependencies]
  expected_answer_contains: [auth]

- id: s10
  question: "Show me the call chain leading up to hash_password"
  category: structural
  expected_tools: [find_callers]
  expected_answer_contains: [hash_password]

- id: s11
  question: "What would break if I removed the invalidate_session function?"
  category: structural
  expected_tools: [impact_analysis]
  expected_answer_contains: [invalidate_session]

- id: s12
  question: "Who calls register_user and what does it depend on?"
  category: structural
  expected_tools: [find_callers, find_callees]
  expected_answer_contains: [register_user]

- id: s13
  question: "Which files does models.py depend on?"
  category: structural
  expected_tools: [file_dependencies]
  expected_answer_contains: [models]

- id: s14
  question: "Give me the full context around authenticate() including callers and callees"
  category: structural
  expected_tools: [get_context]
  expected_answer_contains: [authenticate]

- id: s15
  question: "What is the transitive call graph starting from login()?"
  category: structural
  expected_tools: [find_callees, get_context]
  expected_answer_contains: [login]

